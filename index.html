<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aditya Bharti — Digital Marketer</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
:root{
  --bg:#05070d;
  --accent:#8b5cf6;
  --text:#ffffff;
  --muted:#8b8fa3;
  --font-head:'Syne',sans-serif;
  --font-body:'Inter',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overflow:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:25px 6vw;
  z-index:10;
}
.nav-logo{
  font-family:var(--font-head);
  font-weight:800;
}
.nav-links{
  display:flex;
  gap:30px;
}
.nav-links a{
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
}
.nav-links a:hover{color:white;}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* Glow background */
.hero-glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(139,92,246,0.4), transparent 70%);
  filter:blur(120px);
}

/* Layout */
.hero-inner{
  width:100%;
  max-width:1200px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6vw;
}

/* LEFT */
.hero-left{
  max-width:300px;
}
.hero-left p{
  color:#b084ff;
  margin-bottom:10px;
}
.hero-left h1{
  font-family:var(--font-head);
  font-size:48px;
  line-height:1.1;
}

/* RIGHT */
.hero-right{
  text-align:right;
  max-width:300px;
}
.hero-right p{
  color:#b084ff;
}
.hero-right h2{
  font-family:var(--font-head);
  font-size:40px;
}

/* IMAGE CENTER */
.hero-center{
  position:relative;
}

.hero-img{
  width:350px;
  transform:translateY(40px);
  opacity:0;
}

/* Hover tilt */
.hero-center:hover .hero-img{
  transform:scale(1.05);
}

/* floating effect */
@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0px);}
}
.hero-img{
  animation:float 4s ease-in-out infinite;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">aditya.dev</div>
  <div class="nav-links">
    <a href="#">ABOUT</a>
    <a href="#">WORK</a>
    <a href="#">CONTACT</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">

  <div class="hero-glow"></div>

  <div class="hero-inner">

    <!-- LEFT -->
    <div class="hero-left">
      <p>Hello! I'm</p>
      <h1>ADITYA<br>BHARTI</h1>
    </div>

    <!-- CENTER IMAGE -->
    <div class="hero-center">
      <img 
        src="https://images.unsplash.com/photo-1607746882042-944635dfe10e"
        class="hero-img"
      />
    </div>

    <!-- RIGHT -->
    <div class="hero-right">
      <p>A Creative</p>
      <h2>MARKETER</h2>
    </div>

  </div>

</section>

<script>

/* ENTRY ANIMATION */
gsap.to(".hero-img",{
  y:0,
  opacity:1,
  duration:1.2,
  ease:"power3.out"
});

gsap.from(".hero-left",{
  x:-100,
  opacity:0,
  duration:1,
  delay:0.3
});

gsap.from(".hero-right",{
  x:100,
  opacity:0,
  duration:1,
  delay:0.3
});

/* PARALLAX MOUSE */
document.addEventListener("mousemove",(e)=>{
  let x=(e.clientX/window.innerWidth-0.5)*20;
  let y=(e.clientY/window.innerHeight-0.5)*20;

  gsap.to(".hero-img",{
    x:x,
    y:y,
    duration:0.5
  });
});

</script>

</body>
</html>
